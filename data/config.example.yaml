# Nexus configuration — copy to data/config.yaml and customize
# Or run: python -m nexus setup (easier!)

# Model preset — determines which LLM provider + models to use
# Available: free | cheap | balanced | quality | openai-cheap | openai-balanced | anthropic
# "free" uses Ollama (local, no API key), "cheap" uses DeepSeek (~$0.01/day),
# "balanced" uses Gemini Flash+Pro (~$0.05/day), "quality" uses Gemini Pro (~$0.15/day)
# "openai-cheap" uses GPT-4.1 Nano/Mini (~$0.03/day), "anthropic" uses Claude Haiku/Sonnet (~$0.10/day)
preset: balanced

user:
  name: "Your Name"
  timezone: "America/New_York"    # Used for scheduling
  output_language: "en"           # Briefing output language

briefing:
  schedule: "06:00"               # Daily pipeline time (HH:MM in your timezone)
  format: "two-host-dialogue"
  style: "analytical"             # Style directive passed to LLM
  depth: "detailed"               # "brief" | "detailed"

# Define your intelligence topics
# Pre-built source registries exist for: iran-us-relations, ai-ml-research,
# formula-1, global-energy-transition. For custom topics, run:
#   python -m nexus sources discover <topic-slug>
topics:
  - name: "AI/ML Research"
    priority: high                # high | medium | low
    subtopics: ["LLM", "computer vision", "AI safety"]
    source_languages: ["en"]      # ISO 639-1 codes
    perspective_diversity: medium  # low | medium | high (min source affiliation balance)
    filter_threshold: 6.0         # 1-10, lower = more articles pass
    scope: medium                 # narrow | medium | broad (affects event extraction cap)

# LLM model assignments per pipeline stage (overrides preset if set)
# Uncomment to override specific stages:
# models:
#   filtering: "gemini-3-flash-preview"
#   synthesis: "gemini-3.1-pro-preview"
#   knowledge_summary: "gemini-3-flash-preview"
#   dialogue_script: "gemini-3.1-pro-preview"
#   breaking_news: "gemini-3-flash-preview"
#   agent: "gemini-3.1-pro-preview"

# Audio podcast generation
audio:
  enabled: true
  tts_backend: "gemini"                       # "gemini" | "openai" | "elevenlabs"
  tts_model: "gemini-2.5-flash-preview-tts"
  voice_host_a: "Kore"                        # Host A voice name
  voice_host_b: "Puck"                        # Host B voice name

# Breaking news alerts
breaking_news:
  enabled: true
  poll_interval_hours: 3
  threshold: 7                    # 1-10, only alert above this
  # wire_feeds:                   # Custom wire feed sources (optional)
  #   - type: rss
  #     url: "https://feeds.reuters.com/reuters/topNews"
  #     id: reuters-wire

# Telegram delivery
telegram:
  enabled: true
  # chat_id is set automatically on first /start

# Budget limits (optional)
budget:
  daily_limit_usd: 1.00          # Hard stop — no LLM calls beyond this
  warning_threshold_usd: 0.50    # Telegram alert when exceeded
  degradation_strategy: "skip_expensive"  # "skip_expensive" | "stop_all"

sources:
  discover_new_sources: false     # Auto-discover new feeds for topics
