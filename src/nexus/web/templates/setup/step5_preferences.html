{% extends "setup/base_setup.html" %}
{% block wizard_content %}
<h2>Your Preferences</h2>
<p class="setup-desc">Tell Nexus a bit about you.</p>

<form method="post" action="/setup/step/5">
    <div class="form-group">
        <label for="user_name">Your Name</label>
        <input type="text" id="user_name" name="user_name" class="form-input"
               value="{{ user_name }}" placeholder="Your name" required>
    </div>

    <div class="form-group">
        <label for="timezone">Timezone</label>
        <select id="timezone" name="timezone" class="form-select">
            {% set timezones = [
                ("UTC", "UTC"),
                ("America/New_York", "Eastern (New York)"),
                ("America/Chicago", "Central (Chicago)"),
                ("America/Denver", "Mountain (Denver)"),
                ("America/Los_Angeles", "Pacific (Los Angeles)"),
                ("Europe/London", "London"),
                ("Europe/Berlin", "Berlin / Paris"),
                ("Europe/Moscow", "Moscow"),
                ("Asia/Tokyo", "Tokyo"),
                ("Asia/Shanghai", "Shanghai"),
                ("Asia/Kolkata", "India (Kolkata)"),
                ("Asia/Dubai", "Dubai"),
                ("Australia/Sydney", "Sydney"),
                ("Pacific/Auckland", "Auckland"),
            ] %}
            {% for tz_value, tz_label in timezones %}
            <option value="{{ tz_value }}" {% if timezone == tz_value %}selected{% endif %}>{{ tz_label }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="schedule">Briefing Time</label>
            <input type="time" id="schedule" name="schedule" class="form-input"
                   value="{{ schedule }}">
            <span class="form-hint">When to generate your daily briefing</span>
        </div>

        <div class="form-group">
            <label for="style">Briefing Style</label>
            <select id="style" name="style" class="form-select">
                <option value="analytical" {% if style == 'analytical' %}selected{% endif %}>Analytical</option>
                <option value="conversational" {% if style == 'conversational' %}selected{% endif %}>Conversational</option>
                <option value="brief" {% if style == 'brief' %}selected{% endif %}>Brief</option>
            </select>
        </div>
    </div>

    <div class="setup-actions">
        <a href="/setup/step/4" class="btn-secondary">Back</a>
        <button type="submit" class="btn-primary">Continue</button>
    </div>
</form>
{% endblock %}
