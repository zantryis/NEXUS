{% extends "setup/base_setup.html" %}
{% block wizard_content %}
<h2>API Key</h2>
<p class="setup-desc">Enter your <code>{{ required_key }}</code> to continue.</p>

{% if error %}
<div class="alert-error">{{ error }}</div>
{% endif %}

<form method="post" action="/setup/step/2">
    <div class="form-group">
        <label for="api_key">
            {{ required_key }}
            {% if key_already_set %}
            <span class="badge badge-active" style="margin-left:0.5rem;font-size:0.7rem;">Key set</span>
            {% endif %}
        </label>
        <input type="password" id="api_key" name="api_key" class="form-input"
               placeholder="{% if key_already_set %}Leave blank to keep current key{% else %}Paste your API key here{% endif %}"
               {% if not key_already_set %}required{% endif %} autocomplete="off">
        <span class="form-hint">Your key is stored locally in the project <code>.env</code> and never sent anywhere.</span>
    </div>

    <div class="setup-actions">
        <a href="/setup" class="btn-secondary">Back</a>
        <button type="submit" class="btn-primary">Continue</button>
    </div>
</form>
{% endblock %}
