{% extends "setup/base_setup.html" %}
{% block wizard_content %}
<h2>Choose Your Topics</h2>
<p class="setup-desc">Enter any topic you care about — Nexus will automatically find and evaluate sources for it.</p>
{% if error %}
<div style="background: var(--nx-red-soft, rgba(239,68,68,0.1)); border: 1px solid var(--nx-red, #ef4444); border-radius: 8px; padding: 0.75rem 1rem; margin-bottom: 1rem; color: var(--nx-text);">
    {{ error }}
</div>
{% endif %}

<form method="post" action="/setup/step/2">
    <div style="margin-bottom: 1.5rem;">
        <label style="font-weight:600; margin-bottom:0.5rem; display:block;">Your Topics</label>
        <div id="custom-topics-list">
            <div class="custom-topic-row" style="display:flex;gap:0.5rem;margin-bottom:0.5rem;">
                <input type="text" name="custom_topics" class="form-input"
                       placeholder="e.g. Cryptocurrency Markets, European Politics, K-Pop">
            </div>
        </div>
        <button type="button" class="btn-skip" onclick="addTopicRow()" style="margin-top:0.25rem;">
            + Add another topic
        </button>
    </div>

    <label style="font-weight:600; margin-bottom:0.5rem; display:block;">Pre-configured Topics <span style="font-weight:400; color:var(--nx-muted);">— sources already curated, ready to go</span></label>
    <div class="topic-grid">
        {% for slug, name in topic_choices %}
        <label class="topic-card">
            <input type="checkbox" name="topics" value="{{ slug }}"
                   {% if name in (selected_topics | map(attribute='name') | list) %}checked{% endif %}>
            <div class="topic-card-inner">
                <span class="topic-name">{{ name }}</span>
            </div>
        </label>
        {% endfor %}
    </div>

    <div class="setup-actions">
        <a href="/setup" class="btn-secondary">Back</a>
        <button type="submit" class="btn-primary">Continue</button>
    </div>
</form>

<script>
function addTopicRow() {
    const list = document.getElementById('custom-topics-list');
    const row = document.createElement('div');
    row.className = 'custom-topic-row';
    row.style.cssText = 'display:flex;gap:0.5rem;margin-bottom:0.5rem;';
    row.innerHTML = '<input type="text" name="custom_topics" class="form-input" placeholder="e.g. Beauty, Sports, Finance">'
        + '<button type="button" class="btn-skip" style="color:var(--nx-red);padding:0.4rem;" onclick="this.parentElement.remove()">&#10005;</button>';
    list.appendChild(row);
}
</script>
{% endblock %}
